name: ADSBee Firmware CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  host_build_and_test:

    runs-on: ubuntu-latest
    container: coolnamesalltaken/pico-docker

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Build googletest submodule
      working-directory: firmware/modules/googletest
      run: mkdir build && cd build && cmake -DBUILD_SHARED_LIBS=ON .. && make
    - name: Create build directory
      working-directory: firmware/adsbee_1090/pico
      run: mkdir -p build
    - name: Run cmake with build type "Test"
      working-directory: firmware/adsbee_1090/pico/build
      run: cmake -DCMAKE_BUILD_TYPE=Test -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ ..
    - name: Build
      working-directory: firmware/adsbee_1090/pico/build
      run: make
    - name: Run unit tests
      working-directory: firmware/adsbee_1090/pico/build
      run: ctest --verbose

  esp_target_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Build ESP32 firmware
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: release-v5.4
        target: esp32s3
        path: firmware/adsbee_1090/esp
    - name: Upload ESP32 firmware
      uses: actions/upload-artifact@v4
      with:
        name: adsbee_esp.bin
        path: firmware/adsbee_1090/esp/build/adsbee_esp.bin
        retention-days: 1
    - name: Upload ESP32 bootloader
      uses: actions/upload-artifact@v4
      with:
        name: bootloader.bin
        path: firmware/adsbee_1090/esp/build/bootloader/bootloader.bin
        retention-days: 1
    - name: Upload ESP32 partition table
      uses: actions/upload-artifact@v4
      with:
        name: partition-table.bin
        path: firmware/adsbee_1090/esp/build/partition_table/partition-table.bin
        retention-days: 1
  
  ti_target_build:
    runs-on: ubuntu-latest
    container: coolnamesalltaken/ti-lpf2

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Create TI build directory
      working-directory: firmware/adsbee_1090/ti/sub_ghz_radio
      run: mkdir -p build
    - name: Run cmake with build type "Release"
      working-directory: firmware/adsbee_1090/ti/sub_ghz_radio/build
      run: cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=/usr/bin/arm-none-eabi-gcc -DCMAKE_CXX_COMPILER=/usr/bin/arm-none-eabi-g++ ..
    - name: Build
      working-directory: firmware/adsbee_1090/ti/sub_ghz_radio/build
      run: cmake --build . --config Release --target all -j 22
    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sub_ghz_radio.bin
        path: firmware/adsbee_1090/ti/sub_ghz_radio/build/sub_ghz_radio.bin
        retention-days: 1

  pico_target_build:
    runs-on: ubuntu-latest
    container: coolnamesalltaken/pico-docker
    needs:
      - esp_target_build
      - ti_target_build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Create ESP32 build directory
      working-directory: firmware/adsbee_1090/esp
      run: mkdir -p build
    - name: Download ESP32 firmware
      uses: actions/download-artifact@v4
      with:
        name: adsbee_esp.bin
        path: firmware/adsbee_1090/esp/build/Release
    - name: Download ESP32 bootloader
      uses: actions/download-artifact@v4
      with:
        name: bootloader.bin
        path: firmware/adsbee_1090/esp/build/Release/bootloader
    - name: Download ESP32 partition table
      uses: actions/download-artifact@v4
      with:
        name: partition-table.bin
        path: firmware/adsbee_1090/esp/build/Release/partition_table
    - name: Download TI firmware
      uses: actions/download-artifact@v4
      with:
        name: sub_ghz_radio.bin
        path: firmware/adsbee_1090/ti/sub_ghz_radio/build
    - name: Create Pico build directory
      working-directory: firmware/adsbee_1090/pico
      run: mkdir -p build
    - name: Run cmake with build type "Release"
      working-directory: firmware/adsbee_1090/pico/build
      run: cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=/usr/bin/arm-none-eabi-gcc -DCMAKE_CXX_COMPILER=/usr/bin/arm-none-eabi-g++ ..
    - name: Build
      working-directory: firmware/adsbee_1090/pico/build
      run: cmake --build . --config Release --target all -j 22
    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          firmware/adsbee_1090/pico/build/application/combined.uf2
          firmware/adsbee_1090/pico/build/application/adsbee_1090.ota

  hardware_test:
    runs-on: [self-hosted, adsbee-hardware]
    needs: pico_target_build
    # Run only on pushes to main — not on PRs — so hardware failures block
    # merges without gating every PR on physical hardware availability.
    # To temporarily disable: remove the branch protection requirement for
    # this job in Settings → Branches → main → Required status checks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download firmware artifacts
      uses: actions/download-artifact@v4
      with:
        name: firmware
        path: firmware/adsbee_1090/pico/build/application

    - name: Install Python dependencies
      run: |
        python3 -m venv .venv
        .venv/bin/pip install -r ci/requirements.txt

    - name: Run hardware test
      run: |
        .venv/bin/python3 ci/test_ota.py \
          -p /dev/ttyACM0 \
          --uf2 firmware/adsbee_1090/pico/build/application/combined.uf2 \
          --ota-fw firmware/adsbee_1090/pico/build/application/adsbee_1090.ota
