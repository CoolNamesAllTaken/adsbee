<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>ADSBee</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="adsbee.js"></script>
</head>

<body>
    <!-- Tab bar -->
    <div class="tab-bar">
        <div class="tab-bar-tabs">
            <span class="tab-logo">ADSBee</span>
            <button class="tab-btn active" data-tab="console" onclick="switchTab('console')">Console</button>
            <button class="tab-btn" data-tab="radar" onclick="switchTab('radar')">Radar</button>
        </div>
        <div class="tab-bar-controls">
            <span class="theme-toggle-label">&#9788;</span>
            <label class="toggle-switch">
                <input type="checkbox" id="darkModeToggle">
                <span class="toggle-slider"></span>
            </label>
            <span class="theme-toggle-label">&#9790;</span>
        </div>
    </div>

    <!-- Console tab -->
    <div id="tab-console" class="tab-content active">
        <div class="column-container">
            <div id="terminal" class="column-element" onclick="focusTerminal()">
                <div id="terminal-content"></div>
                <div class="input-line">
                    <span class="prompt">&gt;</span>
                    <span id="current-line"><span id="cursor"> </span></span>
                </div>
                <input type="text" class="hidden-input" id="hidden-input" autocomplete="off">
            </div>

            <div id="metrics-container" class="column-element metrics">
                <div id="receiver-metrics-container">
                    <div class="metrics-header">Receiver Metrics</div>
                    <!-- Cards will be dynamically inserted here -->
                </div>
                <div id="feed-metrics-container">
                    <div class="feed-metrics-header">
                        <span id="feed-count" class="metrics-header">Feeds: 0</span>
                        <button id="add-feed-btn" class="add-feed-btn" onclick="FeedEditor.openFirstEmpty()">+ Add</button>
                    </div>
                    <!-- Cards will be dynamically inserted here -->
                </div>
                <div id="device-status-container" class="device-status">
                    <div class="metrics-header">Device Status</div>
                    <div id="device-status-cards-container" class="device-status-cards">
                        <!-- Device status cards will be dynamically inserted here -->
                    </div>
                </div>
            </div>

            <div class="tools-container column-element">
                <div class="button-row">
                    <button id="uploadButton" class="tools-button">
                        Upload Firmware
                    </button>
                    <input type="file" id="fileInput" accept=".ota" style="display: none;">

                    <button id="downloadSettings" class="tools-button">
                        Download Settings
                    </button>
                    <button id="restoreSettings" class="tools-button">
                        Restore Settings
                    </button>
                </div>

                <input type="file" id="settingsFile" accept=".settings" style="display: none;">


            </div>
        </div>
    </div>

    <!-- Radar tab -->
    <div id="tab-radar" class="tab-content">
        <div id="radar-left">
            <div id="map-container">
                <div id="map"></div>
            </div>
            <div id="resize-handle" title="Drag to resize"></div>
            <div id="aircraft-table-container">
                <table id="aircraft-table">
                    <thead>
                        <tr>
                            <th>ICAO</th>
                            <th>Callsign</th>
                            <th>Sqwk</th>
                            <th>Alt&nbsp;(ft)</th>
                            <th>Spd&nbsp;(kt)</th>
                            <th>Hdg</th>
                            <th>Lat</th>
                            <th>Lon</th>
                            <th>RSSI</th>
                        </tr>
                    </thead>
                    <tbody id="aircraft-tbody"></tbody>
                </table>
            </div>
        </div>
        <div id="aircraft-sidebar">
            <div class="sidebar-header">
                <span id="sidebar-title">—</span>
                <button class="sidebar-close" id="sidebar-close">×</button>
            </div>
            <div id="sidebar-fields"></div>
        </div>
    </div>

    <!-- Feed editor modal -->
    <div id="feed-modal" style="display:none;">
        <div id="feed-modal-box">
            <h2>Edit Feed</h2>
            <p id="feed-modal-status"></p>
            <input type="hidden" id="feed-slot">
            <div id="feed-form" style="display:none;">
                <div class="feed-field">
                    <label>URI</label>
                    <input type="text" id="feed-uri" placeholder="feed.adsb.fi">
                </div>
                <div class="feed-field">
                    <label>Port</label>
                    <input type="number" id="feed-port" min="1" max="65535">
                </div>
                <div class="feed-field feed-field-inline">
                    <label>Active</label>
                    <input type="checkbox" id="feed-active">
                </div>
                <div class="feed-field">
                    <label>Protocol</label>
                    <select id="feed-protocol"></select>
                </div>
            </div>
            <div class="feed-modal-buttons">
                <button class="tools-button" onclick="FeedEditor.save()">Save</button>
                <button class="tools-button feed-remove-btn" onclick="FeedEditor.remove()">Remove</button>
                <button class="tools-button feed-cancel-btn" onclick="FeedEditor.close()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Firmware update modal -->
    <div id="firmware-modal" style="display:none;">
        <div id="firmware-modal-box">
            <h2>Firmware Update In Progress</h2>
            <p id="firmware-modal-status">Erasing flash...</p>
            <div class="progress-container" style="display:flex; margin: 12px 0 8px;">
                <div class="progress-bar">
                    <div id="firmware-modal-fill" class="progress-fill" style="width:0%"></div>
                </div>
                <div id="firmware-modal-text" class="progress-text">0%</div>
            </div>
            <div id="firmware-modal-log"></div>
            <p class="firmware-modal-note">Interface is paused during the update. Please do not close this page.</p>
        </div>
    </div>

    <script>
        const HOST_URI = window.location.hostname || "testbee.local";
        const WS_CONFIG = {
            console_ws_url:  `ws://${HOST_URI}/console`,
            metrics_ws_url:  `ws://${HOST_URI}/metrics`,
            aircraft_ws_url: `ws://${HOST_URI}/aircraft`,
            reconnectDelayMs: 5000
        };

        /**
         * Network console terminal.
         */

        const terminal = document.getElementById('terminal');
        const terminalContent = document.getElementById('terminal-content');
        const currentLine = document.getElementById('current-line');
        const hiddenInput = document.getElementById('hidden-input');
        const cursor = document.getElementById('cursor');

        let commandHistory = [];
        let historyIndex = -1;
        let currentCommand = '';
        let cursorPosition = 0;

        const MAX_CONSOLE_LINES = 500;

        function trimConsole() {
            const content = terminalContent.innerHTML;
            const matches = [...content.matchAll(/<br>/g)];
            if (matches.length > MAX_CONSOLE_LINES) {
                const excess = matches.length - MAX_CONSOLE_LINES;
                const cutPos = matches[excess].index + 4; // skip past the '<br>'
                terminalContent.innerHTML = content.substring(cutPos);
            }
        }

        function appendToTerminal(text) {
            // Escape HTML entities to prevent angle brackets from being interpreted as tags
            function escapeHtml(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // Process ANSI escape sequences for colors
            const ansiRegex = /\x1b\[([0-9;]*)m/g;
            let processedText = text;
            let lastIndex = 0;
            let result = '';

            let match;
            while ((match = ansiRegex.exec(text)) !== null) {
                // Add text before the escape sequence (escaped)
                result += escapeHtml(text.slice(lastIndex, match.index));

                const codes = match[1].split(';').map(code => parseInt(code) || 0);

                // Handle color codes
                for (const code of codes) {
                    if (code === 0) {
                        // Reset - close any open spans
                        result += '</span>';
                    } else if (code >= 30 && code <= 37) {
                        // Foreground colors
                        const colors = ['black', 'red', 'green', 'yellow', 'blue', 'magenta', 'cyan', 'white'];
                        result += `<span style="color: ${colors[code - 30]}">`;
                    } else if (code >= 90 && code <= 97) {
                        // Bright foreground colors
                        const brightColors = ['gray', 'lightcoral', 'lightgreen', 'lightyellow', 'lightblue', 'lightpink', 'lightcyan', 'white'];
                        result += `<span style="color: ${brightColors[code - 90]}">`;
                    }
                }

                lastIndex = ansiRegex.lastIndex;
            }

            // Add remaining text (escaped)
            result += escapeHtml(text.slice(lastIndex));
            processedText = result;

            terminalContent.innerHTML += processedText;
            trimConsole();
            terminal.scrollTop = terminal.scrollHeight;
        }

        function focusTerminal() {
            hiddenInput.focus();
        }

        function updateDisplay() {
            const beforeCursor = currentCommand.substring(0, cursorPosition);
            const afterCursor = currentCommand.substring(cursorPosition);
            if (afterCursor.length > 0) {
                currentLine.innerHTML = beforeCursor + '<span id="cursor">' + afterCursor[0] + '</span>' + afterCursor.slice(1);
            } else {
                currentLine.innerHTML = beforeCursor + '<span id="cursor"> </span>';
            }
        }

        function handleCommand(command) {
            if (command.trim()) {
                commandHistory.push(command);
                historyIndex = commandHistory.length;
                appendToTerminal('> ' + command + '\n');

                consoleWebSocket.send(command + '\r\n');
            }
            currentLine.textContent = '';
            currentCommand = '';
            cursorPosition = 0;
            hiddenInput.value = '';
            updateDisplay();
        }

        hiddenInput.addEventListener('input', (e) => {
            const inputValue = hiddenInput.value;
            const inputLength = inputValue.length;
            const commandLength = currentCommand.length;

            if (inputLength > commandLength) {
                // Character was added
                const newChar = inputValue[inputLength - 1];
                currentCommand = currentCommand.substring(0, cursorPosition) + newChar + currentCommand.substring(cursorPosition);
                cursorPosition++;
            } else if (inputLength < commandLength) {
                // Character was deleted (backspace)
                if (cursorPosition > 0) {
                    currentCommand = currentCommand.substring(0, cursorPosition - 1) + currentCommand.substring(cursorPosition);
                    cursorPosition--;
                }
            }

            hiddenInput.value = currentCommand;
            updateDisplay();
        });

        hiddenInput.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'Enter':
                    e.preventDefault();
                    handleCommand(currentCommand);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        currentCommand = commandHistory[historyIndex];
                        cursorPosition = currentCommand.length;
                        hiddenInput.value = currentCommand;
                        updateDisplay();
                    }
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (historyIndex < commandHistory.length - 1) {
                        historyIndex++;
                        currentCommand = commandHistory[historyIndex];
                    } else {
                        historyIndex = commandHistory.length;
                        currentCommand = '';
                    }
                    cursorPosition = currentCommand.length;
                    hiddenInput.value = currentCommand;
                    updateDisplay();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (cursorPosition > 0) { cursorPosition--; updateDisplay(); }
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (cursorPosition < currentCommand.length) { cursorPosition++; updateDisplay(); }
                    break;
                case 'Home':
                    e.preventDefault();
                    cursorPosition = 0;
                    updateDisplay();
                    break;
                case 'End':
                    e.preventDefault();
                    cursorPosition = currentCommand.length;
                    updateDisplay();
                    break;
                case 'Delete':
                    e.preventDefault();
                    if (cursorPosition < currentCommand.length) {
                        currentCommand = currentCommand.substring(0, cursorPosition) + currentCommand.substring(cursorPosition + 1);
                        hiddenInput.value = currentCommand;
                        updateDisplay();
                    }
                    break;
                case 'Tab':
                    e.preventDefault();
                    break;
            }
        });

        // Handle copy/paste
        document.addEventListener('copy', (e) => {
            const selection = window.getSelection();
            if (selection.toString().length > 0) {
                e.clipboardData.setData('text/plain', selection.toString());
                e.preventDefault();
            }
        });

        document.addEventListener('paste', (e) => {
            e.preventDefault();
            const paste = e.clipboardData.getData('text');
            currentCommand = currentCommand.substring(0, cursorPosition) + paste + currentCommand.substring(cursorPosition);
            cursorPosition += paste.length;
            hiddenInput.value = currentCommand;
            updateDisplay();
        });

        // Keep cursor blinking when window is inactive
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                cursor.style.animation = 'none';
                cursor.offsetHeight; // Trigger reflow
                cursor.style.animation = null;
            }
        });

        window.addEventListener('pagehide', () => {
            consoleWebSocket?.close(1000, 'Tab closing - normal shutdown');
            metricsWebSocket?.close(1000, 'Tab closing - normal shutdown');
            aircraftWebSocket?.close(1000, 'Tab closing - normal shutdown');
        });

        // Initialize dark mode
        const darkModeToggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            darkModeToggle.checked = true;
        }
        darkModeToggle.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode', darkModeToggle.checked);
            localStorage.setItem('darkMode', darkModeToggle.checked ? 'true' : 'false');
        });

        /**
         * Tab management and radar.
         */

        let consoleWebSocket = null;
        let metricsWebSocket = null;
        let aircraftWebSocket = null;
        let radarMap = null;
        let aircraftStore = null;
        let acTable = null;
        let aircraftUpdateTimer = null;

        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === name);
            });
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.toggle('active', el.id === `tab-${name}`);
            });

            if (name === 'console') {
                if (aircraftWebSocket) aircraftWebSocket.pause();
                clearInterval(aircraftUpdateTimer);
                aircraftUpdateTimer = null;
                consoleWebSocket.resume();
                metricsWebSocket.resume();
                focusTerminal();
            } else if (name === 'radar') {
                consoleWebSocket.pause();
                metricsWebSocket.pause();
                initRadar().catch(e => console.error('Radar init error:', e));
            }
        }

        async function initRadar() {
            if (!aircraftStore) aircraftStore = new AircraftStore();

            if (!radarMap) {
                radarMap = new RadarMap('map', aircraftStore);
                radarMap.onSelectionChanged = (hex) => {
                    if (acTable) acTable.setSelected(hex);
                };
                await radarMap.init();
            } else {
                radarMap.invalidate();
            }

            if (!acTable) {
                acTable = new AircraftTable('aircraft-tbody', aircraftStore, (hex) => {
                    if (radarMap) radarMap.selectAircraft(hex);
                });
            }

            if (!aircraftWebSocket) {
                aircraftWebSocket = new AircraftWebSocket(WS_CONFIG.aircraft_ws_url);
                aircraftWebSocket.onMessage = (ac) => aircraftStore.ingest(ac);
            } else {
                aircraftWebSocket.resume();
            }

            if (!aircraftUpdateTimer) {
                aircraftUpdateTimer = setInterval(() => {
                    aircraftStore.sweep();
                    radarMap.update();
                    acTable.update();
                }, 1000);
            }
        }

        // Initialize on Console tab
        consoleWebSocket = new ConsoleWebSocket(WS_CONFIG.console_ws_url);
        metricsWebSocket = new MetricsWebSocket(WS_CONFIG.metrics_ws_url);
        focusTerminal();

        function initResizeHandle() {
            const handle = document.getElementById('resize-handle');
            const mapEl  = document.getElementById('map-container');
            const tblEl  = document.getElementById('aircraft-table-container');
            let startY, startMap, startTbl;

            function onMove(e) {
                const dy = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
                const newMap = Math.max(120, startMap + dy);
                const newTbl = Math.max(60,  startTbl - dy);
                mapEl.style.cssText = `flex:none;height:${newMap}px`;
                tblEl.style.height  = `${newTbl}px`;
                if (radarMap) radarMap.invalidate();
            }
            function onUp() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup',   onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend',  onUp);
            }
            handle.addEventListener('mousedown', (e) => {
                startY   = e.clientY;
                startMap = mapEl.offsetHeight;
                startTbl = tblEl.offsetHeight;
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup',   onUp);
                e.preventDefault();
            });
            handle.addEventListener('touchstart', (e) => {
                startY   = e.touches[0].clientY;
                startMap = mapEl.offsetHeight;
                startTbl = tblEl.offsetHeight;
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend',  onUp);
                e.preventDefault();
            }, { passive: false });
        }

        // Initialize the uploader when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new FirmwareUploader(HOST_URI);
            new SettingsManager(HOST_URI);
            document.getElementById('sidebar-close').addEventListener('click', () => {
                if (radarMap) radarMap.deselect();
            });
            initResizeHandle();
        });
    </script>
</body>

</html>
